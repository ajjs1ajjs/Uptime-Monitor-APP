name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linters
        run: pip install black flake8 isort
      
      - name: Run Black
        run: black --check src/ --diff || true
      
      - name: Run Flake8
        run: flake8 src/ --max-line-length=100 --extend-ignore=E501 || true
      
      - name: Run isort
        run: isort --check-only src/ --diff || true

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests
        run: pytest tests/ -v --tb=short || true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build-linux:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Create package
        run: |
          mkdir -p dist
          tar --exclude='*.pyc' --exclude='__pycache__' --exclude='.git' \
              --exclude='sites.db' --exclude='*.log' --exclude='UptimeMonitor_EXE' \
              -czvf dist/uptime-monitor-${{ steps.version.outputs.VERSION }}-linux.tar.gz \
              src/ templates/ static/ requirements.txt install.sh debian/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-package
          path: dist/*.tar.gz

  build-deb:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dpkg tools
        run: sudo apt-get install -y dpkg-dev
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
      - name: Update debian control
        run: |
          sed -i "s/^Version: .*/Version: ${{ steps.version.outputs.VERSION }}/" debian/control
      
      - name: Build deb package structure
        run: |
          mkdir -p build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all
          cp -r src/ build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/opt/uptime-monitor/
          cp -r templates/ build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/opt/uptime-monitor/
          cp -r static/ build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/opt/uptime-monitor/
          cp requirements.txt build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/opt/uptime-monitor/
          cp -r debian/ build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/DEBIAN/
          mkdir -p build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/etc/uptime-monitor
          mkdir -p build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/var/lib/uptime-monitor
          mkdir -p build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/var/log/uptime-monitor
          mkdir -p build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/lib/systemd/system
          cp debian/uptime-monitor.service build/uptime-monitor_${{ steps.version.outputs.VERSION }}_all/lib/systemd/system/
      
      - name: Build .deb
        run: |
          cd build
          dpkg-deb --build uptime-monitor_${{ steps.version.outputs.VERSION }}_all
          mv *.deb ../dist/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: dist/*.deb

  build-windows:
    runs-on: windows-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Get version
        id: version
        run: echo "VERSION=${env:GITHUB_REF}" >> $env:GITHUB_OUTPUT
        shell: pwsh
      
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: Build executable
        run: |
          pyinstaller --onefile --name uptime-monitor `
            --add-data "templates;templates" `
            --add-data "static;static" `
            src/main.py
        shell: pwsh
      
      - name: Create distribution package
        run: |
          New-Item -ItemType Directory -Force -Path dist/package
          Copy-Item dist/uptime-monitor.exe dist/package/
          Copy-Item -Recurse templates dist/package/
          Copy-Item -Recurse static dist/package/
          Copy-Item requirements.txt dist/package/
          Copy-Item install.bat dist/package/ -ErrorAction SilentlyContinue
          $version = "${env:GITHUB_REF}" -replace "refs/tags/", ""
          Compress-Archive -Path dist/package/* -DestinationPath dist/uptime-monitor-$version-windows.zip
        shell: pwsh
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.zip

  build-docker:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-deb, build-windows, build-docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.deb" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/
      
      - name: Generate release notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat > release_notes.md << EOF
          # Release ${VERSION}
          
          ## Changes
          
          See [CHANGELOG.md](CHANGELOG.md) for details.
          
          ## Installation
          
          ### Linux (CURL)
          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/ajjs1ajjs/Uptime-Monitor-APP/main/install.sh | sudo bash
          \`\`\`
          
          ### Linux (APT)
          \`\`\`bash
          curl -fsSL https://ajjs1ajjs.github.io/Uptime-Monitor-APP/KEY.gpg | sudo gpg --dearmor -o /usr/share/keyrings/uptime-monitor.gpg
          echo "deb [signed-by=/usr/share/keyrings/uptime-monitor.gpg] https://ajjs1ajjs.github.io/Uptime-Monitor-APP stable main" | sudo tee /etc/apt/sources.list.d/uptime-monitor.list
          sudo apt update && sudo apt install uptime-monitor
          \`\`\`
          
          ### Docker
          \`\`\`bash
          docker pull ghcr.io/ajjs1ajjs/uptime-monitor:${VERSION#v}
          \`\`\`
          
          ### Windows
          Download \`uptime-monitor-${VERSION}-windows.zip\` from assets below.
          
          ## Default Credentials
          - Username: \`admin\`
          - Password: \`admin\`
          
          **Please change the password after first login!**
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: release-assets/*
          generate_release_notes: true

  update-apt-repo:
    runs-on: ubuntu-latest
    needs: [build-deb, create-release]
    permissions:
      contents: write
    steps:
      - name: Checkout apt-repo branch
        uses: actions/checkout@v4
        with:
          ref: apt-repo
          fetch-depth: 0
      
      - name: Download deb package
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: ./new-deb
      
      - name: Update APT repository
        run: |
          # Create directories
          mkdir -p pool/main/u/uptime-monitor
          mkdir -p dists/stable/main/binary-amd64
          
          # Copy new deb to pool
          cp new-deb/*.deb pool/main/u/uptime-monitor/
          
          # Generate Packages file
          dpkg-scanpackages pool/ > dists/stable/main/binary-amd64/Packages || true
          gzip -k -f dists/stable/main/binary-amd64/Packages || true
          
          # Generate Release file
          cat > dists/stable/Release << EOF
          Origin: Uptime Monitor
          Label: Uptime Monitor APT Repository
          Suite: stable
          Codename: stable
          Date: $(date -Ru)
          Architectures: amd64
          Components: main
          Description: APT Repository for Uptime Monitor
          EOF
          
          # Calculate checksums
          if [ -f dists/stable/main/binary-amd64/Packages ]; then
            echo "MD5Sum:" >> dists/stable/Release
            md5sum dists/stable/main/binary-amd64/Packages | awk '{printf " %s %d main/binary-amd64/Packages\n", $1, systime()}' >> dists/stable/Release || true
            if [ -f dists/stable/main/binary-amd64/Packages.gz ]; then
              md5sum dists/stable/main/binary-amd64/Packages.gz | awk '{printf " %s %d main/binary-amd64/Packages.gz\n", $1, systime()}' >> dists/stable/Release || true
            fi
            
            echo "SHA256:" >> dists/stable/Release
            sha256sum dists/stable/main/binary-amd64/Packages | awk '{printf " %s %d main/binary-amd64/Packages\n", $1, systime()}' >> dists/stable/Release || true
            if [ -f dists/stable/main/binary-amd64/Packages.gz ]; then
              sha256sum dists/stable/main/binary-amd64/Packages.gz | awk '{printf " %s %d main/binary-amd64/Packages.gz\n", $1, systime()}' >> dists/stable/Release || true
            fi
          fi
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update APT repository for ${GITHUB_REF#refs/tags/}" || echo "No changes to commit"
          git push origin apt-repo
